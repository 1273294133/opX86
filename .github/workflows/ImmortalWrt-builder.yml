name: OpenWrt Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        run: |
          echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Initialization
        run: |
          sudo apt update -y
          sudo apt install -y build-essential ccache
          sudo timedatectl set-timezone Asia/Shanghai

      - name: Clone ImmortalWrt source
        run: |
          git clone https://github.com/immortalwrt/immortalwrt -b 24.10 openwrt

      - name: Copy config & scripts
        run: |
          cp .config openwrt/.config
          cp diy-part2.sh openwrt/
          chmod +x openwrt/diy-part2.sh

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run custom script
        run: |
          cd openwrt
          ./diy-part2.sh

      - name: Download dependencies
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
