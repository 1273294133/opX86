name: NiuWrt Build

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init Environment
        run: |
          sudo apt update -y
          sudo apt install -y build-essential ccache flex git gawk libncurses-dev python3

      - name: Clone ImmortalWrt 24.10.5
        run: |
          git clone https://github.com/immortalwrt/immortalwrt -b v24.10.5 openwrt

      - name: Copy Config & Scripts
        run: |
          cp .config openwrt/
          cp diy-part2.sh openwrt/
          chmod +x openwrt/diy-part2.sh

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run diy-part2.sh
        run: |
          cd openwrt
          ./diy-part2.sh

      - name: Make Defconfig
        run: |
          cd openwrt
          make defconfig

      - name: Download Dependencies
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: NiuWrt-24.10.5-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
